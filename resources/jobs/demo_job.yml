resources:
  jobs:
    lakflow_asset_bundle_job:
      name: lakflow_asset_bundle_job
      tasks:
        - task_key: ingestion
          notebook_task:
            notebook_path: ../../src/notebooks/notebook1.ipynb
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED