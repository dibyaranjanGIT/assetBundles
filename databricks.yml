# This is a Databricks asset bundle definition for dabtuto.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dabtuto
  uuid: ae9f7ab6-a031-4898-b550-c1756cf121c8


include:
  - resources/*.yml
  - resources/jobs/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      - name_prefix: '[dev ${user.name}]'
      - source_linked_deployment: false
    workspace:
      host: https://dbc-a7bc5cde-9214.cloud.databricks.com
    variables:
      catalog: assetbundle
      schema: dev

  prod:
    mode: production
    workspace:
      host: https://dbc-a7bc5cde-9214.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/dibyaranjan.official@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/dibyaranjan.official@gmail.com/.bundle/${bundle.name}/${bundle.target}
    presets:
      - name_prefix: '[prod ${user.name}]'
      - source_linked_deployment: false
    variables:
      catalog: assetbundle
      schema: prod
    permissions:
      - group_name: users
        level: CAN_RUN
      - group_name: admins  
        level: CAN_MANAGE
      - user_name: dibyaranjan.official@gmail.com
        level: CAN_MANAGE
